{% extends "base.html" %}

{% block title %}Add Product - HardwareHub Admin{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
{% endblock %}

{% block content %}
<div class="admin-container">
    {% include 'admin/sidebar.html' %}
    
    <main class="admin-main">
        <div class="admin-top-bar">
            <h2>Add New Product</h2>
            <a href="{{ url_for('admin_products') }}" class="admin-btn admin-btn-primary">
                <i class="fas fa-arrow-left"></i> Back to Products
            </a>
        </div>
        
        <form class="admin-form" method="POST" enctype="multipart/form-data">
            <div class="admin-form-group">
                <label for="name">Product Name *</label>
                <input type="text" id="name" name="name" required placeholder="e.g., Intel Core i9-13900K">
            </div>
            
            <div class="admin-form-row">
                <div class="admin-form-group">
                    <label for="category">Category *</label>
                    <select id="category" name="category" required>
                        <option value="">Select Category</option>
                        <option value="CPU">Processors (CPU)</option>
                        <option value="GPU">Graphics Cards (GPU)</option>
                        <option value="RAM">Memory (RAM)</option>
                        <option value="Storage">Storage</option>
                        <option value="Motherboard">Motherboard</option>
                        <option value="PSU">Power Supply</option>
                        <option value="Cooling">Cooling</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                
                <div class="admin-form-group">
                    <label for="brand">Brand *</label>
                    <select id="brand" name="brand" required>
                        <option value="">Select Brand</option>
                        <option value="Intel">Intel</option>
                        <option value="AMD">AMD</option>
                        <option value="NVIDIA">NVIDIA</option>
                        <option value="ASUS">ASUS</option>
                        <option value="MSI">MSI</option>
                        <option value="Gigabyte">Gigabyte</option>
                        <option value="Corsair">Corsair</option>
                        <option value="Samsung">Samsung</option>
                        <option value="Western Digital">Western Digital</option>
                        <option value="Seagate">Seagate</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>
            
            <div class="admin-form-row">
                <div class="admin-form-group">
                    <label for="warranty">Warranty</label>
                    <input type="text" id="warranty" name="warranty" placeholder="e.g., 3 Years">
                </div>
                
                <div class="admin-form-group">
                    <label for="discount">Discount (%)</label>
                    <input type="number" id="discount" name="discount" min="0" max="100" value="0">
                </div>
            </div>
            
            <div class="admin-form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="3" placeholder="Brief product description..."></textarea>
            </div>
            
            <div class="admin-form-group">
                <label for="specifications">Technical Specifications</label>
                <textarea id="specifications" name="specifications" rows="4" placeholder="Enter detailed specifications..."></textarea>
            </div>
            
            <div class="admin-form-row">
                <div class="admin-form-group">
                    <label>
                        <input type="checkbox" name="featured"> Featured Product
                    </label>
                </div>
                
                <div class="admin-form-group">
                    <label>
                        <input type="checkbox" name="in_stock" checked> In Stock
                    </label>
                </div>
            </div>
            
            <div class="admin-form-group">
                <label>Product Image</label>
                <div class="image-upload-container" onclick="document.getElementById('imageInput').click()">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>Click to upload product image</p>
                    <p style="font-size: 0.8rem; color: #7f8c8d;">PNG, JPG, JPEG (Max 16MB)</p>
                </div>
                <input type="file" id="imageInput" name="image" accept="image/*" style="display: none;" onchange="previewImage(this)">
                <div class="image-preview" id="imagePreview">
                    <img src="" alt="Preview">
                </div>
            </div>
            
            <div class="admin-form-group">
                <label>Product Variants (Size/Capacity with Price) *</label>
                <div id="variantsContainer">
                    <div class="variant-row">
                        <input type="text" name="variant_name[]" placeholder="e.g., 16GB, 1TB, 500W" required>
                        <input type="number" name="variant_price[]" placeholder="Price (₹)" required>
                        <i class="fas fa-times remove-variant" onclick="this.parentElement.remove()"></i>
                    </div>
                </div>
                <button type="button" class="add-variant-btn" onclick="addVariant()">
                    <i class="fas fa-plus"></i> Add Variant
                </button>
            </div>
            
            <div class="admin-form-actions">
                <button type="submit" class="admin-btn admin-btn-success">
                    <i class="fas fa-save"></i> Save Product
                </button>
                <a href="{{ url_for('admin_products') }}" class="admin-btn admin-btn-primary">
                    Cancel
                </a>
            </div>
        </form>
    </main>
</div>

<script>
    function addVariant() {
        const container = document.getElementById('variantsContainer');
        const newRow = document.createElement('div');
        newRow.className = 'variant-row';
        newRow.innerHTML = `
            <input type="text" name="variant_name[]" placeholder="e.g., 16GB, 1TB, 500W" required>
            <input type="number" name="variant_price[]" placeholder="Price (₹)" required>
            <i class="fas fa-times remove-variant" onclick="this.parentElement.remove()"></i>
        `;
        container.appendChild(newRow);
    }
    
    function previewImage(input) {
        const preview = document.getElementById('imagePreview');
        const previewImg = preview.querySelector('img');
        
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            
            reader.onload = function(e) {
                previewImg.src = e.target.result;
                preview.style.display = 'block';
            }
            
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
{% endblock %}
